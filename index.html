<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Online Quiz</title>

<link rel="icon" type="image/png" href="image.png">
<script src="https://cdn.tailwindcss.com"></script>

<!-- EmailJS -->
<script type="text/javascript"
  src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script type="text/javascript">
  emailjs.init('AQrOoA9vgEUwlbyma'); // ✅ your public key
</script>

<style>
@keyframes scrollRightToLeft {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}
.scrolling-question {
  white-space: nowrap;
  animation: scrollRightToLeft 10s linear 2 forwards;
}
</style>
</head>

<body class="bg-slate-100 h-screen flex items-center justify-center overflow-hidden">

<div class="bg-white shadow-2xl rounded-xl w-full max-w-xl p-6 max-h-[90vh] overflow-hidden">

<!-- LOGIN -->
<div id="login">
  <div class="flex justify-center mb-4">
    <img src="THECOS_Google_Form_Header.png" class="max-h-24 object-contain">
  </div>

  <h1 class="text-2xl font-bold text-center mb-4">Online Quiz</h1>

  <input id="studentName" class="w-full border p-2 mb-3 rounded" placeholder="Enter Full Name">
  <input id="studentEmail" type="email" class="w-full border p-2 mb-4 rounded" placeholder="Enter Email Address">

  <button id="startBtn" class="w-full bg-blue-600 text-white py-2 rounded">
    Start Quiz
  </button>
</div>

<!-- EXAM -->
<div id="exam" class="hidden h-full flex flex-col">

  <div class="flex justify-between mb-3">
    <span id="timer" class="text-red-600 font-bold"></span>
    <span class="text-sm text-gray-500">Tab switching disabled</span>
  </div>

  <div class="flex-1 overflow-y-auto">
    <div class="overflow-hidden mb-4">
      <h2 id="question" class="font-semibold text-lg"></h2>
    </div>
    <div id="options" class="space-y-2"></div>
  </div>

  <div class="pt-4 border-t">
    <button id="nextBtn" class="bg-green-600 text-white px-5 py-2 rounded w-full">
      Next
    </button>
  </div>
</div>

<!-- THANK YOU -->
<div id="thankyou" class="hidden text-center">
  <h1 class="text-2xl font-bold text-green-600 mb-4">✅ Thank You</h1>
  <p class="text-gray-700 mb-2">Your exam has been submitted successfully.</p>
  <p class="text-gray-500">You may now close this page.</p>
</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const QUESTION_VISIBLE_TIME = 20;
  const QUESTION_TIME = 40;

    const QUIZ_QUESTIONS = [

{
question: "Which management thinker introduced 'Management by Objectives (MBO)'?",
options: ["Henry Mintzberg","Peter Drucker","Frederick Taylor","Max Weber"],
correct: "Peter Drucker"
},

{
question: "The concept of bureaucratic organization was developed by:",
options: ["Max Weber","Henri Fayol","Elton Mayo","Chester Barnard"],
correct: "Max Weber"
},

{
question: "Which function of management ensures activities are carried out according to plan?",
options: ["Organizing","Directing","Staffing","Controlling"],
correct: "Controlling"
},

{
question: "Scalar chain refers to:",
options: ["Chain of command","Supply chain","Production chain","Financial chain"],
correct: "Chain of command"
},

{
question: "Which leadership theory focuses on leader traits?",
options: ["Behavioral theory","Contingency theory","Trait theory","Systems theory"],
correct: "Trait theory"
},

{
question: "Which concept focuses on customer satisfaction and long-term relationships?",
options: ["Product concept","Production concept","Selling concept","Marketing concept"],
correct: "Marketing concept"
},

{
question: "The BCG matrix was developed by:",
options: ["Boston Consulting Group","McKinsey & Company","Deloitte","KPMG"],
correct: "Boston Consulting Group"
},

{
question: "Which stage in the product life cycle usually has the highest profits?",
options: ["Introduction","Growth","Maturity","Decline"],
correct: "Maturity"
},

{
question: "Market penetration strategy involves:",
options: ["Increasing price","Increasing market share","Reducing production","Exporting products"],
correct: "Increasing market share"
},

{
question: "Customer Relationship Management (CRM) mainly aims to:",
options: ["Maintain customer loyalty","Reduce production cost","Increase tax","Reduce inventory"],
correct: "Maintain customer loyalty"
},

{
question: "Which accounting principle requires revenue to be recorded when earned?",
options: ["Matching principle","Accrual principle","Consistency principle","Conservatism principle"],
correct: "Accrual principle"
},

{
question: "Goodwill is classified as:",
options: ["Current asset","Fixed liability","Intangible asset","Revenue asset"],
correct: "Intangible asset"
},

{
question: "Trial balance helps in:",
options: ["Detecting all errors","Checking arithmetical accuracy","Calculating tax","Preparing audit report"],
correct: "Checking arithmetical accuracy"
},

{
question: "Which statement shows financial performance of a company?",
options: ["Balance sheet","Cash flow statement","Income statement","Budget report"],
correct: "Income statement"
},

{
question: "Depreciation is charged to:",
options: ["Reduce tax only","Increase capital","Increase profit","Allocate cost of asset"],
correct: "Allocate cost of asset"
},

{
question: "Which ratio measures liquidity?",
options: ["Current ratio","Debt ratio","Profit margin","ROI"],
correct: "Current ratio"
},

{
question: "Weighted Average Cost of Capital (WACC) is used for:",
options: ["Sales forecasting","Tax calculation","Investment decisions","Payroll management"],
correct: "Investment decisions"
},

{
question: "Capital structure refers to:",
options: ["Debt and equity mix","Assets and liabilities","Fixed assets","Current liabilities"],
correct: "Debt and equity mix"
},

{
question: "Which financial tool evaluates investment profitability?",
options: ["Ledger","Balance sheet","Trial balance","NPV"],
correct: "NPV"
},

{
question: "Time value of money means:",
options: ["Money loses value","Money today is worth more than future money","Money value is constant","Money only depends on taxes"],
correct: "Money today is worth more than future money"
},

{
question: "Inflation caused by increased production costs is called:",
options: ["Demand-pull inflation","Imported inflation","Structural inflation","Cost-push inflation"],
correct: "Cost-push inflation"
},

{
question: "Monetary policy in India is controlled by:",
options: ["NITI Aayog","State Bank of India","Reserve Bank of India","Ministry of Finance"],
correct: "Reserve Bank of India"
},

{
question: "Fiscal deficit refers to:",
options: ["Revenue minus expenditure","Expenditure minus revenue","Imports minus exports","Assets minus liabilities"],
correct: "Expenditure minus revenue"
},

{
question: "GDP measures:",
options: ["Population growth","Tax collection","Imports","Total production in a country"],
correct: "Total production in a country"
},

{
question: "A recession means:",
options: ["Rapid economic growth","Decline in economic activity","Inflation rise","Export growth"],
correct: "Decline in economic activity"
},

{
question: "Break-even point occurs when:",
options: ["Profit is maximum","Cost is zero","Sales are lowest","Profit equals zero"],
correct: "Profit equals zero"
},

{
question: "Contribution margin equals:",
options: ["Sales – Variable cost","Sales – Fixed cost","Profit – Tax","Revenue – Expenses"],
correct: "Sales – Variable cost"
},

{
question: "Standard costing is used for:",
options: ["Budget control","Financial audit","Cost comparison","Inventory valuation"],
correct: "Cost comparison"
},

{
question: "Variance analysis is used in:",
options: ["Financial planning","Marketing research","Human resource management","Cost control"],
correct: "Cost control"
},

{
question: "Flexible budget adjusts according to:",
options: ["Production level","Profit level","Tax rate","Interest rate"],
correct: "Production level"
},

{
question: "Administrative theory was developed by:",
options: ["Henri Fayol","Max Weber","Elton Mayo","Taylor"],
correct: "Henri Fayol"
},

{
question: "Good governance emphasizes:",
options: ["Bureaucracy only","Corruption","Monopoly","Transparency"],
correct: "Transparency"
},

{
question: "Decentralization means:",
options: ["Central authority only","Delegating authority to lower levels","Removing authority","Increasing hierarchy"],
correct: "Delegating authority to lower levels"
},

{
question: "Maslow’s highest level of need is:",
options: ["Safety","Social","Self-actualization","Esteem"],
correct: "Self-actualization"
},

{
question: "Herzberg classified salary as:",
options: ["Motivator","Hygiene factor","Psychological factor","Social factor"],
correct: "Hygiene factor"
},

{
question: "Employee empowerment means:",
options: ["Giving authority and responsibility","Punishment","Salary increase","Promotion only"],
correct: "Giving authority and responsibility"
},

{
question: "The Paris Climate Agreement was adopted in:",
options: ["2013","2015","2018","2020"],
correct: "2015"
},

{
question: "Ozone layer protects earth from:",
options: ["Infrared rays","Visible light","Ultraviolet rays","Gamma rays"],
correct: "Ultraviolet rays"
},

{
question: "The Constitution of India was adopted on:",
options: ["26 January 1950","26 November 1949","15 August 1947","1 January 1950"],
correct: "26 November 1949"
},

{
question: "India follows:",
options: ["Presidential system","Parliamentary system","Monarchy","Military rule"],
correct: "Parliamentary system"
},

{
question: "The longest mountain range in the world is:",
options: ["Andes","Himalayas","Alps","Rockies"],
correct: "Andes"
},

{
question: "The Tropic of Cancer passes through:",
options: ["India","Japan","Germany","Canada"],
correct: "India"
},

{
question: "Headquarters of the World Trade Organization is in:",
options: ["London","Paris","Geneva","Washington"],
correct: "Geneva"
},

{
question: "The International Monetary Fund mainly deals with:",
options: ["Military cooperation","Global financial stability","Tourism promotion","Education policy"],
correct: "Global financial stability"
},

{
question: "The United Nations was founded in:",
options: ["1919","1955","1945","1965"],
correct: "1945"
},

{
question: "The FIFA World Cup is organized by:",
options: ["FIFA","International Olympic Committee","ICC","UEFA"],
correct: "FIFA"
},

{
question: "Olympic Games are governed by:",
options: ["International Olympic Committee","FIFA","ICC","UNESCO"],
correct: "International Olympic Committee"
},

{
question: "BRICS recently expanded with new members in 2024 including:",
options: ["Argentina","Saudi Arabia","Japan","Germany"],
correct: "Saudi Arabia"
},

{
question: "The headquarters of BRICS New Development Bank is in:",
options: ["Shanghai","Beijing","Moscow","Delhi"],
correct: "Shanghai"
},

{
question: "The G20 summit includes:",
options: ["20 UN members","20 richest countries","20 Asian countries","20 largest economies"],
correct: "20 largest economies"
}

];

  const login = document.getElementById("login");
  const exam = document.getElementById("exam");
  const thankyou = document.getElementById("thankyou");
  const startBtn = document.getElementById("startBtn");
  const nextBtn = document.getElementById("nextBtn");

  const nameInput = document.getElementById("studentName");
  const emailInput = document.getElementById("studentEmail");
  const timerEl = document.getElementById("timer");
  const questionEl = document.getElementById("question");
  const optionsEl = document.getElementById("options");

  let index = 0;
  let answers = [];
  let timer = null;
  let hideTimer = null;
  let timeLeft = QUESTION_TIME;
  let examFinished = false;

  startBtn.addEventListener("click", () => {
    if (!nameInput.value.trim() || !emailInput.value.trim()) {
      alert("Enter name and email");
      return;
    }

    login.classList.add("hidden");
    exam.classList.remove("hidden");
    document.documentElement.requestFullscreen?.();
    loadQuestion();
  });

  function loadQuestion() {
    const q = QUIZ_QUESTIONS[index];

    questionEl.classList.remove("scrolling-question");
    void questionEl.offsetWidth;
    questionEl.textContent = q.question;
    questionEl.style.visibility = "visible";
    questionEl.classList.add("scrolling-question");

    optionsEl.innerHTML = "";
    q.options.forEach((opt, i) => {
      const label = document.createElement("label");
      label.className = "block border p-2 rounded cursor-pointer";
      label.innerHTML = `<input type="radio" name="option" value="${opt}" class="mr-2">${opt}`;
      optionsEl.appendChild(label);
    });

    hideTimer = setTimeout(() => {
      questionEl.style.visibility = "hidden";
    }, QUESTION_VISIBLE_TIME * 1000);

    timeLeft = QUESTION_TIME;
    updateTimer();

    timer = setInterval(() => {
      timeLeft--;
      updateTimer();
      if (timeLeft <= 0) nextQuestion();
    }, 1000);
  }

  function updateTimer() {
    timerEl.textContent = `Time left: ${timeLeft}s`;
  }

  function nextQuestion() {
    clearInterval(timer);
    clearTimeout(hideTimer);

    const selected = document.querySelector('input[name="option"]:checked');
    answers.push(selected ? selected.value : "Not Answered");

    index++;
    index < QUIZ_QUESTIONS.length ? loadQuestion() : finishExam();
  }

  nextBtn.addEventListener("click", nextQuestion);

  //function sendResultsEmail() {
    //let result = "";
    //QUIZ_QUESTIONS.forEach((q, i) => {
      //result += `Q${i+1}: ${q.question}\nAnswer: ${answers[i]}\n\n`;
    //});

    //emailjs.send("service_8yr4zf5",   
    //"template_kyqnyrd",  {
      //student_name: nameInput.value,
      //student_email: emailInput.value,
      //answers: result
    //}).catch(err => console.error("EmailJS error:", err));
  //}
  
  
  function calculateScore() {
  let score = 0;

  QUIZ_QUESTIONS.forEach((q, i) => {
    if (answers[i] === q.correct) {
      score++;
    }
  });

  return score;
}


  function sendResultsEmail() {
  let result = "";

  QUIZ_QUESTIONS.forEach((q, i) => {
    result += 
`Q${i + 1}: ${q.question}
Selected Answer: ${answers[i]}
Correct Answer: ${q.correct}

`;
  });

  const score = calculateScore();
  const total = QUIZ_QUESTIONS.length;

  emailjs.send(
    "service_8yr4zf5",
    "template_kyqnyrd",
    {
      student_name: nameInput.value,
      student_email: emailInput.value,
      score: `${score} / ${total}`,
      answers: result
    }
  ).catch(err => console.error("EmailJS error:", err));
}


  function finishExam() {
    examFinished = true;
    clearInterval(timer);
    clearTimeout(hideTimer);
    document.exitFullscreen?.();

    sendResultsEmail();

    exam.classList.add("hidden");
    thankyou.classList.remove("hidden");

    setTimeout(() => location.reload(), 5000);
  }

  document.addEventListener("visibilitychange", () => {
    if (document.hidden && !examFinished) {
      alert("Tab switching detected. Exam terminated.");
      location.reload();
    }
  });

});
</script>

</body>
</html>
